name = "DeModeTemplate"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = ".svelte-kit/cloudflare"

# Environment configurations
[env.production]
name = "demode-template-prod"

[env.staging]
name = "demode-template-staging"

[env.development]
name = "demode-template-dev"

# Cloudflare Pages configuration
[build]
command = "bun run build:cloudflare"
watch_dir = "src"

# Optional: Add any environment variables that should be available during builds
[vars]
# Add any public environment variables here

# Optional: KV, D1, or other Cloudflare services bindings
# [[kv_namespaces]]
# binding = "KV_NAMESPACE"
# id = "your-kv-namespace-id"
